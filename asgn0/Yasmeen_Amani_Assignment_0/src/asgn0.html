<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>CSE160 Assignment 0</title>
    <script src="lib/cuon-matrix-cse160.js"></script>
    <script src="asgn0.js"></script>
  </head>

  <body onload="main()">
    <canvas id="example" width="400" height="400">
     <p>Yasmeen Amani | yamani@ucsc.edu</p>
     <p>Notes to Grader: None </p>
      Please use a browser that supports "canvas"
    </canvas>
    <br/>

    <label>V1 x: <input type="text" id="v1x" value="1"></label>
    <label>V1 y: <input type="text" id="v1y" value="1"></label>
    <br/>
    <label>V2 x: <input type="text" id="v2x" value="2"></label>
    <label>V2 y: <input type="text" id="v2y" value="1"></label>
    <br/>
    <input type="button" value="Draw" onclick="handleDrawEvent()">
    <br/><br/>

    <label>Operation:
      <select id="op-select">
        <option value="add">Add</option>
        <option value="sub">Subtract</option>
        <option value="mul">Multiply</option>
        <option value="div">Divide</option>
        <option value="magnitude">Magnitude</option>
        <option value="normalize">Normalize</option>
        <option value="angle">Angle Between</option>
        <option value="area">Area</option>
      </select>
    </label>
    <label>Scalar: <input type="text" id="scalar" value="1"></label>
    <input type="button" value="Draw Operation" onclick="handleDrawOperationEvent()">

  </body>
</html>
