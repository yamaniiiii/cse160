<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Asgn1 - Paint Program</title>
  <style>
    body { background: #1a1a1a; color: #eee; font-family: monospace; display: flex; gap: 16px; padding: 16px; }
    canvas { border: 2px solid #555; cursor: crosshair; }
    #controls { display: flex; flex-direction: column; gap: 8px; min-width: 200px; }
    .section { background: #2a2a2a; padding: 10px; border-radius: 6px; }
    .section h3 { margin: 0 0 8px 0; font-size: 12px; color: #aaa; text-transform: uppercase; }
    button { padding: 6px 10px; background: #444; color: #eee; border: 1px solid #666; border-radius: 4px; cursor: pointer; font-family: monospace; }
    button:hover { background: #555; }
    button.active { background: #0078d4; border-color: #0078d4; }
    label { font-size: 12px; display: flex; flex-direction: column; gap: 2px; }
    input[type=range] { width: 100%; }
    #color-preview { width: 100%; height: 24px; border-radius: 4px; border: 1px solid #555; margin-top: 4px; }
    .btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
   
  </style>
</head>
<body onload="main()">

<canvas id="webgl" width="400" height="400">Please use a browser that supports canvas</canvas>

<div id="controls">

  <div class="section">
    <h3>Brush Shape</h3>
    <div class="btn-row">
      <button id="btn-point"    class="active" onclick="setShape('point')">Point</button>
      <button id="btn-triangle" onclick="setShape('triangle')">Triangle</button>
      <button id="btn-circle"   onclick="setShape('circle')">Circle</button>
    </div>
  </div>

  <div class="section">
    <h3>Size</h3>
    <label>Size: <span id="sizeVal">10</span>
      <input type="range" id="size" min="1" max="80" value="10"
             oninput="g_size=+this.value; document.getElementById('sizeVal').textContent=this.value;">
    </label>
  </div>

  <div class="section">
    <h3>Circle Segments</h3>
    <label>Segments: <span id="segVal">12</span>
      <input type="range" id="segments" min="3" max="64" value="12"
             oninput="g_segments=+this.value; document.getElementById('segVal').textContent=this.value;">
    </label>
  </div>

  <div class="section">
    <h3>Color</h3>
    <label>R: <input type="range" id="r" min="0" max="255" value="255" oninput="updateColor()"></label>
    <label>G: <input type="range" id="g" min="0" max="255" value="0"   oninput="updateColor()"></label>
    <label>B: <input type="range" id="b" min="0" max="255" value="0"   oninput="updateColor()"></label>
    <div id="color-preview"></div>
  </div>

  <div class="section">
    <h3>Actions</h3>
    <div class="btn-row">
      <button onclick="clearCanvas()">Clear</button>
      <button onclick="drawPicture()">Draw Picture</button>
    </div>
  </div>


</div>

<script src="lib/webgl-utils.js"></script>
<script src="lib/webgl-debug.js"></script>
<script src="lib/cuon-utils.js"></script>
<script src="ColoredPoints.js"></script>
</body>
</html>
